<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF Investment Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #fff; color: #1a1a1a; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    .card { background: #f5f5f3; border-radius: 8px; padding: 1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .label { font-size: 13px; color: #666; margin: 0 0 4px; }
    .value { font-size: 22px; font-weight: 500; margin: 0; }
    .green { color: #0F6E56; }
    .sliders { display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.5rem; }
    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-row label { font-size: 14px; color: #666; min-width: 130px; }
    .slider-row input[type=range] { flex: 1; }
    .slider-row span { font-size: 14px; font-weight: 500; min-width: 50px; }
    .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: #666; }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { position: relative; width: 100%; height: 300px; }
    .section-label { font-size: 13px; color: #666; margin: 0 0 8px; }
    .divider { border-top: 0.5px solid #ddd; margin-top: 1.5rem; padding-top: 1rem; }
    .scenario-card { background: #f5f5f3; border-radius: 8px; padding: 12px; }
    .scenario-label { font-size: 11px; color: #666; margin: 0 0 4px; }
    .scenario-value { font-size: 16px; font-weight: 500; margin: 0; }
  </style>
</head>
<body>

<h1>ETF investment calculator</h1>

<div class="grid2">
  <div class="card">
    <p class="label">Monthly investment</p>
    <p class="value" id="disp-monthly">£100</p>
  </div>
  <div class="card">
    <p class="label">Total invested</p>
    <p class="value" id="disp-invested">£24,000</p>
  </div>
  <div class="card">
    <p class="label">Final value (7%/yr)</p>
    <p class="value green" id="disp-value">£52,397</p>
  </div>
  <div class="card">
    <p class="label">Profit from returns</p>
    <p class="value green" id="disp-profit">£28,397</p>
  </div>
</div>

<div class="sliders">
  <div class="slider-row">
    <label>Monthly (£)</label>
    <input type="range" min="50" max="1000" step="50" value="100" id="monthly">
    <span id="out-monthly">£100</span>
  </div>
  <div class="slider-row">
    <label>Years</label>
    <input type="range" min="5" max="40" step="1" value="20" id="years">
    <span id="out-years">20 yrs</span>
  </div>
</div>

<div class="legend">
  <span><span class="dot" style="background:#1D9E75;"></span>Optimistic (10%/yr)</span>
  <span><span class="dot" style="background:#378ADD;"></span>Average (7%/yr)</span>
  <span><span class="dot" style="background:#888780;border:1px dashed #888780;"></span>Total invested</span>
</div>

<div class="chart-wrap">
  <canvas id="chart" role="img" aria-label="Line chart showing investment growth over time"></canvas>
</div>

<div class="divider">
  <p class="section-label">Projected final value by scenario</p>
  <div class="grid3" id="scenarios"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function calcFV(monthly, years, rate) {
  const r = rate / 12;
  const n = years * 12;
  return monthly * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);
}
function fmt(n) {
  return '£' + Math.round(n).toLocaleString('en-GB');
}
let myChart;
function buildChart(monthly, years) {
  const labels = [], data7 = [], data10 = [], dataInv = [];
  for (let y = 0; y <= years; y++) {
    labels.push(y === 0 ? 'Now' : (36 + y) + ' yrs');
    data7.push(Math.round(calcFV(monthly, y, 0.07)));
    data10.push(Math.round(calcFV(monthly, y, 0.10)));
    dataInv.push(Math.round(monthly * y * 12));
  }
  if (myChart) myChart.destroy();
  myChart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '10%/yr', data: data10, borderColor: '#1D9E75', tension: 0.3, pointRadius: 0, fill: false },
        { label: '7%/yr', data: data7, borderColor: '#378ADD', tension: 0.3, pointRadius: 0, fill: false },
        { label: 'Invested', data: dataInv, borderColor: '#888780', borderDash: [5,5], tension: 0, pointRadius: 0, fill: false }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => '£' + (v >= 1000 ? Math.round(v/1000) + 'k' : v) } },
        x: { ticks: { autoSkip: true, maxTicksLimit: 6 } }
      }
    }
  });
}
function buildScenarios(monthly, years) {
  const rates = [{r:0.05,label:'Conservative (5%)',color:'#888780'},{r:0.07,label:'Average (7%)',color:'#378ADD'},{r:0.10,label:'Optimistic (10%)',color:'#1D9E75'}];
  document.getElementById('scenarios').innerHTML = rates.map(s => `
    <div class="scenario-card">
      <p class="scenario-label">${s.label}</p>
      <p class="scenario-value" style="color:${s.color}">${fmt(calcFV(monthly, years, s.r))}</p>
    </div>
  `).join('');
}
function update() {
  const monthly = parseInt(document.getElementById('monthly').value);
  const years = parseInt(document.getElementById('years').value);
  const invested = monthly * years * 12;
  const val7 = calcFV(monthly, years, 0.07);
  document.getElementById('out-monthly').textContent = '£' + monthly;
  document.getElementById('out-years').textContent = years + ' yrs';
  document.getElementById('disp-monthly').textContent = '£' + monthly;
  document.getElementById('disp-invested').textContent = fmt(invested);
  document.getElementById('disp-value').textContent = fmt(val7);
  document.getElementById('disp-profit').textContent = fmt(val7 - invested);
  buildChart(monthly, years);
  buildScenarios(monthly, years);
}
document.getElementById('monthly').addEventListener('input', update);
document.getElementById('years').addEventListener('input', update);
update();
</script>
</body>
</html>
